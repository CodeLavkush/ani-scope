openapi: 3.0.0

info:
  title: Ani Scope API
  version: 2.1.0
  description: |
    Ani Scope API — Production-grade anime platform backend.

    Features:
    - Authentication & Authorization
    - Anime management
    - Watchlist system
    - Reviews & Ratings
    - Cursor-based pagination

servers:
  - url: http://localhost:4000

tags:
  - name: Healthcheck
  - name: Auth
  - name: Anime
  - name: Watchlist
  - name: Review
  - name: Rating

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    limit:
      name: limit
      in: query
      schema:
        type: number
        example: 10

    cursor:
      name: cursor
      in: query
      schema:
        type: string
        example: 665abc123

  schemas:

    ApiResponse:
      type: object
      properties:
        statusCode:
          type: number
        data:
          type: object
        message:
          type: string

    PaginationResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        nextCursor:
          type: string
          nullable: true

    User:
      type: object
      properties:
        _id:
          type: string
        username:
          type: string
        email:
          type: string

    Anime:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        poster:
          type: string
        isSeries:
          type: boolean

    Review:
      type: object
      properties:
        _id:
          type: string
        content:
          type: string
        createdAt:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RatingStats:
      type: object
      properties:
        avgRating:
          type: number
        totalRatings:
          type: number

paths:

  # =========================
  # HEALTHCHECK
  # =========================
  /api/v1/healthcheck:
    get:
      tags: [Healthcheck]
      summary: Check server health
      responses:
        "200":
          description: API is healthy

  # =========================
  # AUTH
  # =========================
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username: { type: string }
                email: { type: string }
                password: { type: string }
                age: { type: number }
                gender: { type: string }
                avatar:
                  type: string
                  format: binary
      responses:
        "201": { description: User registered }
        "409": { description: User exists }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: test@mail.com
              password: password123
      responses:
        "200": { description: Login successful }

  /api/v1/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email
      requestBody:
        required: true
        content:
          application/json:
            example:
              otp: "123456"
      responses:
        "200": { description: Verified }

  /api/v1/auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh token
      responses:
        "200": { description: Token refreshed }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Logout
      responses:
        "200": { description: Logged out }

  /api/v1/auth/current-user:
    post:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Get current user
      responses:
        "200": { description: User fetched }

  /api/v1/auth/resend-email-verification:
    post:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Resend OTP
      responses:
        "200": { description: OTP sent }

  /api/v1/auth/create-admin:
    post:
      tags: [Auth]
      summary: Create admin
      requestBody:
        content:
          application/json:
            example:
              email: admin@mail.com
              password: admin123
      responses:
        "200": { description: Admin created }

  /api/v1/auth/:
    get:
      tags: [Auth]
      summary: Get all profiles
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Profiles fetched }

    patch:
      tags: [Auth]
      summary: Update profile
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
      responses:
        "200": { description: Updated }

    delete:
      tags: [Auth]
      summary: Delete profile
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Deleted }

  # =========================
  # ANIME
  # =========================
  /api/v1/anime:
    get:
      tags: [Anime]
      summary: Get anime list
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Anime list }

    post:
      tags: [Anime]
      summary: Create anime
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
      responses:
        "201": { description: Created }

  /api/v1/anime/{animeId}:
    get:
      tags: [Anime]
      summary: Get anime by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Found }

    put:
      tags: [Anime]
      summary: Update anime
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
      responses:
        "200": { description: Updated }

    delete:
      tags: [Anime]
      summary: Delete anime
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
      responses:
        "200": { description: Deleted }

  # =========================
  # WATCHLIST
  # =========================
  /api/v1/watchlist:
    get:
      tags: [Watchlist]
      summary: Get watchlist
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200": { description: Watchlist fetched }

  /api/v1/watchlist/{animeId}:
    post:
      tags: [Watchlist]
      summary: Add to watchlist
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
      responses:
        "201": { description: Added }

    delete:
      tags: [Watchlist]
      summary: Remove from watchlist
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
      responses:
        "200": { description: Removed }

  # =========================
  # REVIEWS
  # =========================
  /api/v1/reviews/{animeId}:
    get:
      tags: [Review]
      summary: Get reviews
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200": { description: Reviews fetched }

    post:
      tags: [Review]
      summary: Create review
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
      requestBody:
        content:
          application/json:
            example:
              content: Great anime!
      responses:
        "201": { description: Created }

  /api/v1/reviews/{id}:
    patch:
      tags: [Review]
      summary: Update review
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200": { description: Updated }

    delete:
      tags: [Review]
      summary: Delete review
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200": { description: Deleted }

  # =========================
  # RATINGS
  # =========================
  /api/v1/ratings/{animeId}:
    get:
      tags: [Rating]
      summary: Get rating stats
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
      responses:
        "200": { description: Stats fetched }

    post:
      tags: [Rating]
      summary: Create rating
      security: [{ bearerAuth: [] }]
      parameters:
        - name: animeId
          in: path
          required: true
      requestBody:
        content:
          application/json:
            example:
              rate: 8
      responses:
        "201": { description: Created }

  /api/v1/ratings/{id}:
    patch:
      tags: [Rating]
      summary: Update rating
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200": { description: Updated }

    delete:
      tags: [Rating]
      summary: Delete rating
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200": { description: Deleted }